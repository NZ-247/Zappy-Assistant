<!doctype html><html><head><title>Triggers</title></head><body>
<h1>Triggers</h1>
<a href="/">Flags</a> | <a href="/triggers">Triggers</a> | <a href="/status">Status</a> | <a href="/messages">Messages</a> | <a href="/commands">Commands</a> | <a href="/queues">Queues</a> | <a href="/logs">Audit</a>
<div><input id="apiBase" placeholder="API Base" /><input id="token" placeholder="Admin token" /><button onclick="saveSettings()">Save</button></div>
<div>
<input id="name" placeholder="name" /><input id="pattern" placeholder="pattern" /><input id="responseTemplate" placeholder="response template" />
<select id="matchType"><option>CONTAINS</option><option>REGEX</option><option>STARTS_WITH</option></select>
<input id="priority" type="number" placeholder="priority" /><input id="cooldownSeconds" type="number" placeholder="cooldownSeconds" />
<select id="scope"><option>GLOBAL</option><option>TENANT</option><option>GROUP</option><option>USER</option></select>
<input id="tenantId" placeholder="tenantId (optional)" /><input id="groupId" placeholder="groupId (optional)" /><input id="userId" placeholder="userId (optional)" />
<label>enabled <input id="enabled" type="checkbox" checked /></label>
<button onclick="createTrigger()">Create</button><button onclick="loadTriggers()">Refresh</button>
</div>
<pre id="data"></pre><script src="/app.js"></script></body></html>
