services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zappy_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  assistant-api:
    build:
      context: ..
      dockerfile: apps/assistant-api/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
    ports:
      - "3333:3333"

  admin-ui:
    build:
      context: ..
      dockerfile: apps/admin-ui/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - assistant-api
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
