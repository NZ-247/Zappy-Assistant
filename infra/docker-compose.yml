services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zappy_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zappy_assistant"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 3s

  assistant-api:
    build:
      context: ..
      dockerfile: apps/assistant-api/Dockerfile
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3333:3333"

  media-resolver-api:
    build:
      context: ..
      dockerfile: apps/media-resolver-api/Dockerfile
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3335:3335"

  admin-ui:
    build:
      context: ..
      dockerfile: apps/admin-ui/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - assistant-api
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
